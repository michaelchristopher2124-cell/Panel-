<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Panel | Pro Forex Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #ffffff;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #0f1235; border: 1px solid #1e2268; border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        h1 { color: #00d4aa; margin-bottom: 20px; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #00d4aa; }
        input, select { width: 100%; padding: 12px; background: #1a1e4a; border: 1px solid #2a2e6a; border-radius: 12px; color: white; margin-bottom: 15px; }
        button { background: #00d4aa; color: #0a0e27; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #1e2268; }
        th { color: #00d4aa; }
        .used-true { color: #ff6b6b; }
        .used-false { color: #00d4aa; }
        .back-link { color: #00d4aa; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Back to Home</a>
    <h1>🔐 Admin Panel</h1>
    <p style="margin-bottom: 20px; color: #a0a4c0;">Manage unlock codes for your Forex Journal</p>

    <div class="card">
        <h2>➕ Generate New Unlock Code</h2>
        <input type="text" id="newCode" placeholder="Enter custom code (or leave blank for random)">
        <button onclick="generateCode()">Generate & Save</button>
        <div id="generateResult" style="margin-top: 10px;"></div>
    </div>

    <div class="card">
        <h2>📋 Existing Unlock Codes</h2>
        <div id="codesList">Loading codes...</div>
    </div>

    <div class="card">
        <h2>💰 Payment & Price Info</h2>
        <p><strong>Price:</strong> ₦2,000 (Updated)</p>
        <p><strong>Account Number:</strong> 8112401459</p>
        <p><strong>Bank:</strong> Opay</p>
        <p><strong>Name:</strong> Segun Martin Michael</p>
        <button onclick="copyPaymentInfo()">Copy Payment Info</button>
    </div>
</div>

<script>
    const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/eizek3qs2z56o';
    const CODES_SHEET_URL = `${SHEETDB_API_URL}/codes`;

    async function loadCodes() {
        const container = document.getElementById('codesList');
        container.innerHTML = 'Loading...';
        
        try {
            const response = await fetch(CODES_SHEET_URL);
            const codes = await response.json();
            
            if (codes.length === 0) {
                container.innerHTML = '<p>No codes found. Generate one above.</p>';
                return;
            }
            
            let tableHtml = `<table>
                <thead><tr><th>Code</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>`;
            
            codes.forEach(code => {
                const isUsed = code.used === 'TRUE';
                tableHtml += `
                    <tr>
                        <td><code>${code.code}</code></td>
                        <td class="used-${isUsed}">${isUsed ? 'USED ❌' : 'AVAILABLE ✅'}</td>
                        <td><button onclick="deleteCode(${code.id})" style="background:#ff6b6b; padding:5px 10px;">Delete</button></td>
                    </tr>
                `;
            });
            
            tableHtml += `</tbody></table>`;
            container.innerHTML = tableHtml;
        } catch (error) {
            console.error('Error loading codes:', error);
            container.innerHTML = '<p>Error loading codes. Make sure your SheetDB is set up correctly.</p>';
        }
    }

    async function generateCode() {
        let newCode = document.getElementById('newCode').value.trim();
        if (!newCode) {
            newCode = 'CODE' + Math.random().toString(36).substring(2, 10).toUpperCase();
        }
        
        const resultDiv = document.getElementById('generateResult');
        resultDiv.innerHTML = 'Saving...';
        
        try {
            const response = await fetch(CODES_SHEET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: newCode, used: 'FALSE' })
            });
            
            if (response.ok) {
                resultDiv.innerHTML = `<span style="color: #00d4aa;">✅ Code "${newCode}" created successfully!</span>`;
                document.getElementById('newCode').value = '';
                loadCodes();
                setTimeout(() => { resultDiv.innerHTML = ''; }, 3000);
            } else {
                throw new Error('Failed to create code');
            }
        } catch (error) {
            console.error('Error creating code:', error);
            resultDiv.innerHTML = `<span style="color: #ff6b6b;">❌ Failed to create code. Make sure the code is unique.</span>`;
        }
    }

    async function deleteCode(id) {
        if (!confirm('Are you sure you want to delete this code?')) return;
        
        try {
            const response = await fetch(`${CODES_SHEET_URL}/${id}`, { method: 'DELETE' });
            if (response.ok) {
                loadCodes();
            } else {
                alert('Failed to delete code');
            }
        } catch (error) {
            console.error('Error deleting code:', error);
            alert('Error deleting code');
        }
    }

    function copyPaymentInfo() {
        const info = "Opay: 8112401459\nName: Segun Martin Michael\nAmount: ₦2,000";
        navigator.clipboard.writeText(info);
        alert('Payment info copied!');
    }

    loadCodes();
</script>
</body>
</html>
